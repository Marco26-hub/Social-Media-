# Runner degli agenti (gratis, dentro GitHub — nessun servizio esterno).
# Chiama gli endpoint /api/agents/* con l'header Authorization: Bearer CRON_SECRET.
#
# STATO: esecuzione AUTOMATICA A CALENDARIO DISATTIVATA (scelta: 2026-07-17).
# Gli agenti si lanciano a mano, in due modi:
#   - dal prodotto: /dashboard/agenti → "Esegui ora" (usa la sessione admin,
#     NON serve CRON_SECRET né APP_BASE_URL) — è il modo consigliato per l'admin;
#   - da qui: tab Actions → questo workflow → "Run workflow" (manuale). Per questa
#     via servono i due valori sotto.
#
# Per RIATTIVARE il cron automatico: togli il commento al blocco `schedule:`.
# Setup necessario SOLO per il "Run workflow" da GitHub (o per il cron):
# 1) GitHub: Settings → Secrets and variables → Actions → Secrets → CRON_SECRET
#    = stesso valore della env CRON_SECRET su Vercel.
# 2) GitHub: Settings → Secrets and variables → Actions → Variables → APP_BASE_URL
#    = dominio prod SENZA slash finale (es. https://www.socialautomation.app).
name: Agenti automatici

on:
  # Esecuzione automatica a calendario DISATTIVATA: scommenta per riattivarla.
  # schedule:
  #   - cron: '0 7 * * 1'   # ogni lunedì 07:00 UTC (~09:00 in Italia)
  workflow_dispatch: {}

# Un solo run alla volta (evita sovrapposizioni se un run è lento).
concurrency:
  group: agenti-cron
  cancel-in-progress: false

jobs:
  run-agents:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.APP_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Verifica CRON_SECRET e APP_BASE_URL
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET mancante. Aggiungilo in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$BASE_URL" ]; then
            echo "::error::APP_BASE_URL mancante. Impostala in Settings → Secrets and variables → Actions → Variables (dominio Vercel)."
            exit 1
          fi
      - name: Esegui gli agenti (solo clienti AUTO + agenti abilitati)
        run: |
          fail=0
          for path in genera-contenuti seo-audit geo-audit ads email-sequence report competitor-analysis; do
            echo "▶ $path"
            code=$(curl -s -o /tmp/out.json -w '%{http_code}' --max-time 300 -X POST \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$BASE_URL/api/agents/$path" || echo 000)
            echo "  HTTP $code — $(head -c 400 /tmp/out.json)"
            # 200 = ok, 502 = nessun output (nessun cliente AUTO o tutti falliti): entrambi
            # sono "il run è partito". Altri codici = problema di rete/auth/deploy.
            if [ "$code" != "200" ] && [ "$code" != "502" ]; then
              echo "::warning::$path ha risposto $code"
              fail=1
            fi
          done
          exit $fail
