name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI 6 checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 1. Lint
        run: npm run lint

      - name: 2. Build
        env:
          AUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build

      - name: 3. Security audit
        run: npm audit --audit-level=moderate

      - name: 4. Migration dry-run
        run: npm run migrate:dry

      - name: 5. Smoke test demo runtime
        env:
          PORT: 3000
          AUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: |
          npm run start > /tmp/social-automation.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID || true' EXIT
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/system/health >/dev/null; then
              break
            fi
            sleep 1
          done
          bash scripts/smoke-test.sh http://localhost:3000

      - name: 6. Production env guard
        env:
          DATABASE_URL: postgresql://user:pass@example.com/neondb?sslmode=require
          AUTH_SECRET: ci-secret
          NEXTAUTH_URL: https://social-automation.example.com
          NEXT_PUBLIC_SITE_URL: https://social-automation.example.com
          OPENROUTER_API_KEY: ci-openrouter-placeholder
          BLOTATO_API_KEY: ci-blotato-placeholder
          BLOTATO_WEBHOOK_SECRET: ci-webhook-secret
          NEXT_PUBLIC_DEMO_MODE: "false"
          SHOW_LOGIN_HINT: "false"
        run: npm run prod:check:strict
