services:
  - type: web
    name: social-automation-v2
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate
    startCommand: npm run start
    healthCheckPath: /api/system/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BLOTATO_API_KEY
        sync: false
      - key: BLOTATO_API_URL
        value: https://api.blotato.com
      - key: BLOTATO_WEBHOOK_SECRET
        generateValue: true
      - key: SHOW_LOGIN_HINT
        value: "false"
